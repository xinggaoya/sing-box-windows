name: Release (Pre-release)

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows
          # Pin Linux runner to avoid newer glibc baseline (e.g. 2.39 on ubuntu-latest)
          # which causes "GLIBC_2.39 not found" on older distros.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            build-essential curl wget file libxdo-dev libssl-dev librsvg2-dev librsvg2-common \
            pango1.0-tools libcairo2-dev libgdk-pixbuf2.0-dev libglib2.0-dev libsoup2.4-dev

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        shell: bash
        env:
          # 透传 token 给 fetch-kernel，避免匿名 API 限流导致 latest 拉取失败。
          SING_BOX_GITHUB_TOKEN: ${{ github.token }}
        run: |
          pnpm run build
          # 显式走 package script（tauri-wrapper），确保只注入当前 target 的内核资源
          pnpm run tauri build --target ${{ matrix.target }}

      - name: Verify Linux glibc compatibility
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail
          BIN_PATH="src-tauri/target/${{ matrix.target }}/release/sing-box-windows"
          if [ ! -f "$BIN_PATH" ]; then
            echo "Binary not found: $BIN_PATH"
            exit 1
          fi

          MAX_GLIBC="$(objdump -T "$BIN_PATH" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sed 's/GLIBC_//' | sort -V | tail -n1)"
          echo "Detected max GLIBC requirement: ${MAX_GLIBC}"

          # Keep compatibility for distros with glibc 2.38 (e.g. Deepin/UOS variants).
          if dpkg --compare-versions "${MAX_GLIBC}" gt "2.38"; then
            echo "Incompatible glibc requirement: ${MAX_GLIBC} (must be <= 2.38)"
            exit 1
          fi

      - name: Create Windows portable zip
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $exePath = "src-tauri/target/${{ matrix.target }}/release/sing-box-windows.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "可执行文件未找到: $exePath"
            exit 1
          }
          $portableDir = "src-tauri/target/${{ matrix.target }}/release/bundle/portable"
          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null
          $zipPath = Join-Path $portableDir "sing-box-windows-portable.zip"
          Compress-Archive -Path $exePath -DestinationPath $zipPath -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-artifacts
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
          retention-days: 1

  release:
    name: Publish Pre-release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: windows-artifacts/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: linux-artifacts/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: macos-artifacts/

      - name: Extract tag name
        id: tag
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Extract Release Notes from CHANGELOG
        id: extract_notes
        run: node .github/scripts/extract-release-notes.js "${{ steps.tag.outputs.tag }}"

      - name: Summarize artifacts
        shell: bash
        run: |
          echo "🧾 准备发布预发布版本: ${{ steps.tag.outputs.tag }}"
          echo "✅ 产物列表预览："
          find windows-artifacts -type f 2>/dev/null | sed 's/^/ - /' || true
          find linux-artifacts -type f 2>/dev/null | sed 's/^/ - /' || true
          find macos-artifacts -type f 2>/dev/null | sed 's/^/ - /' || true

      - name: Create / Update Pre-release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          prerelease: true
          make_latest: false
          generate_release_notes: false
          name: "[Pre-release] ${{ steps.tag.outputs.tag }}"
          tag_name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.extract_notes.outputs.release_notes }}
          files: |
            windows-artifacts/msi/*.msi
            windows-artifacts/nsis/*.exe
            windows-artifacts/portable/sing-box-windows-portable.zip
            linux-artifacts/appimage/sing-box-windows_*.AppImage*
            linux-artifacts/deb/sing-box-windows_*.deb*
            macos-artifacts/dmg/sing-box-windows_*.dmg*
            macos-artifacts/macos/sing-box-windows.app.tar.gz*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
